# the archive root: the directory that holds the generated rasters (this directory)
qed.nisar: .

# a NISAR GSLC
gslc:
    uri: "{qed.nisar}/gslc.h5"

# a NISAR GCOV
gcov:
    uri: "{qed.nisar}/gcov.h5"


# attach the dataset to the application
datasets:
    - nisar.gslc#gslc
    - nisar.gcov#gcov


# run as a web app on a default test port; a runner launches {qed} from this directory and may
# override the port on the command line so parallel suites do not collide, e.g.
#     qed --nexus.services.web.address=ip4:0.0.0.0:<port>
qed.app:
    shell: web
    nexus.services.web:
        address: ip4:0.0.0.0:8124

# never spawn a browser; the test driver owns the browser
pyre.shells.web#qed.app.shell:
    auto: no


# end of file
